  .el-dialog.dialog-privacy {
    --el-dialog-border-radius: .3rem
  }

  .el-dialog {
    border-radius: 18px

  .card-offset {
    --bs-card-border-color: rgba(0, 0, 0, .04);
    --bs-card-border-radius: 1rem;
    --bs-card-box-shadow: 0 0 1rem 0 rgba(136, 152, 170, .15);
    --bs-card-inner-border-radius: 1rem;
    --bs-card-cap-bg: #fff;
    --card-title-border: 1px solid rgba(203, 100, 52, .05);
    --card-title-bg-color: var(--color-privacy-4);
    --card-title-color: rgba(var(--color-privacy-5-rgb), .75);
    box-shadow: var(--bs-card-box-shadow);
    margin-top: 16px;
    margin-bottom: 32px
  }

  .card-offset h5,
  .card-offset .h5 {
    font-size: 1.25rem;
    line-height: 1.375
  }

  .card-offset>.card-header {
    padding-top: 0px;
    padding-bottom: 0px;
    border-bottom: none
  }

  .card-offset>.card-header .card-title {
    position: absolute;
    z-index: 2;
    background-color: var(--card-title-bg-color);
    margin-left: 6px;
    margin-top: -18px !important;
    margin-bottom: 0px !important;
    padding-top: 6px;
    padding-bottom: 6px;
    padding-right: 20px;
    padding-left: 12px;
    border-radius: 8px;
    display: inline-flex;
    border: var(--card-title-border);
    align-items: center
  }

  .card-offset>.card-header .card-title p {
    color: var(--card-title-color) !important;
    margin: 0px;
    text-transform: uppercase;
    font-weight: 600;
    font-size: .875rem !important
  }

  .card-offset>.card-header .card-title svg {
    color: var(--card-title-color);
    position: relative;
    max-height: .9rem;
    margin-right: 10px
  }

  .card-offset>.card-header .card-title.with-info {
    padding-right: 50px
  }

  .card-offset>.card-header .card-title.with-info .tooltip-info {
    position: absolute;
    right: 0px
  }

  .card-offset>.card-body {
    padding-top: 1.2rem;
    padding-left: 24px
  }

  .card-offset>.card-body>div {
    min-height: 65px
  }

  .card-offset>.card-buttons {
    margin: 18px 22px
  }

  .card-offset>.card-buttons .btn {
    margin-right: 12px
  }

  .card-offset>.card-body~.card-buttons {
    margin-top: 0px
  }

  .text-title {

  }

  .text-xs i::before {

  }

  .el-form .el-form-item__label {
    font-size: 16px;
    color: var(--text-color)
  }

  .el-input__wrapper {
    border-radius: 18px
  }

  .el-form .form-group {
    --el-input-height: 30px;
    --text-color: rgb(108, 117, 125);
    --text-color-prefix: #a8abb2;
    --padding-top: 25px;
    --padding-bottom: 5px;
    --padding-left: 10px;
    --padding-right: 10px;
    padding-bottom: 2px !important;
    position: relative
  }

  .el-form .form-group>label,
  .el-form .form-group>.el-form-item__label {
    font-weight: 400;
    text-transform: uppercase;
    position: absolute;
    font-size: .8em;
    top: 0px;
    width: 100%;
    padding: 0 var(--padding-left);
    margin: 5px 0 0px 0;
    transition: opacity .2s ease-out;
    z-index: 2
  }

  .el-form .form-group:not(.ellipsis-none)>label,
  .el-form .form-group:not(.ellipsis-none)>.el-form-item__label {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis
  }

  .el-form .form-group .prefix-inner,
  .el-form .form-group>.el-form-item__content>.el-input>.el-input__wrapper>.el-input__prefix>.el-input__prefix-inner {
    position: absolute;
    align-items: center;
    justify-content: center;
    display: inline-flex;
    z-index: 1;
    width: 49px;
    height: 100%;
    left: 0px;
    font-size: 19px;
    color: var(--text-color-prefix);
    padding-top: var(--padding-top);
    padding-bottom: var(--padding-bottom)
  }

  .el-form .form-group .prefix-inner svg,
  .el-form .form-group>.el-form-item__content>.el-input>.el-input__wrapper>.el-input__prefix>.el-input__prefix-inner svg {
    margin-right: 8px;
    max-width: 19px
  }

  .el-form .form-group .input-inner,
  .el-form .form-group>.el-form-item__content>.el-input>.el-input__wrapper>input.el-input__inner {
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.5;
    color: var(--input-text-color) !important;
    border: 1px solid #ced4da;
    border-radius: .25rem;
    box-shadow: 0 0 0 2px rgba(0, 0, 0, 0);
    transition: all .2s ease-out;
    position: relative;
    height: 60px;
    padding-top: var(--padding-top);
    padding-right: 10px;
    padding-bottom: var(--padding-bottom);
    padding-left: var(--padding-left)
  }

  .el-form .form-group .prefix-inner+.input-inner,
  .el-form .form-group>.el-form-item__content>.el-input>.el-input__wrapper>.el-input__prefix+input.el-input__inner {
    padding-left: 2.5em
  }

  .el-form .form-group .input-inner.is-focus,
  .el-form .form-group>.el-form-item__content>.el-input>.el-input__wrapper.is-focus input.el-input__inner,
  .el-form .form-group>.el-form-item__content>.el-input>.el-input__wrapper input.el-input__inner:focus {
    box-shadow: 0 0 0 1px #ff9956;
    outline: rgba(0, 0, 0, 0);
    border-color: rgba(0, 0, 0, 0)
  }

  .el-form .form-group>.el-form-item__content>.el-input>.el-input__wrapper {
    padding: 0px;
    box-shadow: none;
    background: var(--input-bg-floating) !important
  }

  .el-form .form-group>.el-form-item__content>.el-input.el-date-editor>.el-input__wrapper {

  /* Cor primária Privacy aplicada em <a> e .text-primary do Bootstrap. */
  .text-primary {

  .text-muted {
    color: #6c757d;
  }

  a {

  }

  a.text-primary:focus,
  a.text-primary:hover {
    color: #fe754f !important;
  }

  /* ─── Filter buttons (Profile + Collections + Header) ──────────────── */

  .filter-button {
    display: flex;
    align-items: center;
    font-size: 1rem;
    color: var(--bs-text-color) !important;
    background-color: transparent;
    line-height: 1.5rem;
    text-transform: uppercase;
    font-weight: 400;
    padding: 8px 12px;
    border-radius: 100px;
    transition:
      background-color 0.1s,
      color 0.1s;
    user-select: none;
  }

  .filter-button.selected {
    font-size: 16px;
    color: var(--color-privacy) !important;
    background-color: var(--navigation-link-bg);
    pointer-events: none;
  }

  .filter-button:hover {
    background-color: transparent;
    color: var(--bs-text-color) !important;
  }

  @media (max-width: 769px) {
    .filter-button {
      font-size: 12px;
    }

    /*
     * Light peach do mobile vaza no dark mode. Override scoped por theme
     * em globals.css trata o caso `html.dark-mode`/`html[data-theme="dark"]`.
     */
    .filter-button.selected {
      font-size: 12px !important;
      background: #fef3f1 !important;
    }
  }

  /* ─── Footer estático (age-restriction) ──────────────────────────────── */

  .footer-text {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: auto;
    padding-top: 8px;
    text-align: center;
    font-family: sans-serif;
    font-size: 12px;
    color: #a8abb2;

  .default-back-button {
    position: absolute;
    left: 16px;
    width: 24px;
    cursor: pointer;
  }

  /* ─── Utility minimal ────────────────────────────────────────────────── */

  .font-13 {
    font-size: 13px;
  }

  /* ─── Profile body + tabs mosaic ────────────────────────────────────── */
  /* IDs vêm do `ProfileShell.tsx` (Razor preservou nomenclatura por
   compatibilidade visual). */

  #bodyPosts {
    overflow: hidden;
  }

  #bodyPostsMosaico {
    margin: 0 1rem;
    margin-top: 12px;
    padding: 0 !important;
    background-color: var(--card-bg-1);

  #bodyPostsMosaico .filter-button {

    font-size: 16px;
    background: none !important;
    color: var(--bs-text-color) !important;
  }

  #bodyPostsMosaico .filter-button.selected {
    font-size: 16px !important;
    background: var(--navigation-link-bg) !important;
    color: var(--color-privacy) !important;
  }

  #bodyPostsMosaico .parent {
    padding: 0 12px;
    padding-bottom: 16px;
    margin: 0 !important;
  }

  #bodyPostsMosaico .column {
    padding: 0;
    overflow: hidden;
    border: 2px solid white;
    position: relative;
  }

  /* Pseudo-element força aspect-ratio 1:1 nas tiles do mosaico. */
  #bodyPostsMosaico .column:before {
    content: "";
    float: left;
    padding-top: 100%;
  }

  /* ─── Float menu + privacy-header (WC navigation) ────────────────────── */
  /* IDs consumidos pelos WCs `privacy-web-float-menu` (light DOM) e nosso
   `AuthHeader.tsx`. `html.fullscreen-active` é setado pelo
   `fullscreenManager.js` quando uma WC entra em fullscreen (publisher,
   media viewer). */

  #float-menu--wrapper {
    position: relative;
    z-index: 10;
    padding-bottom: constant(safe-area-inset-bottom, 0);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }

  @media (max-width: 800px) {
    html.fullscreen-active #float-menu--wrapper {
      display: none !important;
    }
  }

  @media (min-width: 800px) {

    html.fullscreen-active #float-menu--wrapper,
    html.fullscreen-active #privacy-header {
      z-index: 0 !important;
    }
  }

  /* ─── Element Plus popup lock (body scroll lock) ─────────────────────── */
  /* Element Plus seta `.el-popup-parent--hidden` no <body> quando algum
   `<el-dialog>` dentro de WC abre. Travamos scroll do body inteiro pra
   evitar dois scrollbars empilhados (modal + página). */

  body:has(.el-popup-parent--hidden) {
    overflow: hidden !important;
    overscroll-behavior: none !important;
    position: fixed !important;
    left: 0 !important;
    right: 0 !important;
  }

  /* ─── Theme overrides ────────────────────────────────────────────────── */
  /* `.navbar` (PublicHeader.tsx) usa o bg do body. globals.css carrega o
   `html, body { background: var(--bs-body-bg) }` base; aqui só o navbar. */

  .navbar {
    background-color: var(--bs-body-bg);
  }

    <style>
      #privacy-splash {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 2147483000;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f9f6f2;
        opacity: 1;
        transition: opacity 220ms ease-out;
        pointer-events: auto;
        touch-action: none;
      }

      /* Tema herdado de html[data-theme] (set pré-paint no layout) → sem flash no F5. */
      :root[data-theme="dark"] #privacy-splash {
        background-color: #121212;
      }

      /* Navegação: cobre o miolo + a faixa do FloatMenu (header de 56px fica). O
     splash vai até o bottom porque o wrapper do menu virou transparente — parar
     em 64px exporia o conteúdo em load atrás do menu. O menu sobe pra cima do
     splash (regra abaixo) e continua visível. */
      #privacy-splash.splash--content {
        top: 56px;
        bottom: 0;
      }

      /* Menu acima do splash SÓ no modo conteúdo (full-load mantém o menu coberto =
     loading puro). !important vence o z-index inline (10) do wrapper. */
      html.privacy-splash-content #float-menu--wrapper {
        z-index: 2147483001 !important;
      }

      #privacy-splash.is-dismissed {
        opacity: 0;
        pointer-events: none;
      }

      html.privacy-splash-locked,
      html.privacy-splash-locked body {
        overflow: hidden !important;
        overscroll-behavior: contain;
      }

      #privacy-splash .splash-stage {

      #privacy-splash .logo-pulse {

      #privacy-splash .logo-pulse:nth-child(2) {

      }

      #privacy-splash .logo-pulse:nth-child(3) {

      @keyframes privacy-splash-pulse {
        0% {
          opacity: 0.15;
        }

        30% {
          opacity: 1;
        }

        60% {
          opacity: 0.15;
        }

        100% {
          opacity: 0.15;
        }
      }

      /* Faixa do header: cobre os 56px do topo durante o splash; z ABAIXO do
     header (z:10) → o header desliza por cima. Mesmo bg do splash (seamless
     com o splash de conteúdo em top:56). Só cobre essa faixa, então não
     esconde skeleton (isso é função do splash, z alto). */
      #privacy-splash-header-fill {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 56px;
        z-index: 9;
        background-color: #f9f6f2;
        opacity: 1;
        transition: opacity 220ms ease-out;
        pointer-events: none;
        display: none;

      :root[data-theme="dark"] #privacy-splash-header-fill {
        background-color: #121212;
      }

      #privacy-splash-header-fill.is-dismissed {
        opacity: 0;
      }
    </style>

  <style>
    .privacy-header {
      width: 100%;
      position: fixed;
      top: 0;
      /* iOS PWA standalone (viewport-fit: cover): recua a barra pra baixo da barra
   * de status; o fundo do header preenche a faixa atrás do notch/relógio. No
   * Android e em browser normal --safe-top = 0px (sem efeito). Var central em
   * globals.css (:root). */
      padding-top: var(--safe-top, env(safe-area-inset-top, 0px));
      z-index: 10;
      min-height: 56px;
      height: auto;
      /* Slide via @keyframes (NÃO transition): a animação TOCA quando a classe
   * entra, independente do timing de re-render do React. A transition era
   * engolida porque o browser não captava o "de→para" quando a classe vinha
   * no mesmo commit do re-render. */
      background-color: var(--bs-body-bg, #fff);
      /* color aqui dá fallback pro currentColor dos ícones quando bs vars
   * ainda não chegaram (CSS race condition no boot). */
      color: var(--bs-body-color, #1f2937);
      border-bottom: 0.5px solid var(--bs-border-color, #DDDDDD);
    }

    .privacy-header.is-showing {
      animation: privacy-header-slide-down 0.3s ease-in-out;
    }

    @keyframes privacy-header-slide-up {
      from {
        transform: translateY(0);
        opacity: 1;
      }

      to {
        transform: translateY(-100%);
        opacity: 0;
      }
    }

    @keyframes privacy-header-slide-down {

    /*
 * Notification dot — port 1:1 do PartialHeader.cshtml:72-80. Cor vem de
 * --color-privacy-3 (definida em privacy.css), fallback no laranja
 * privacy padrão pra render correto antes de privacy.css carregar.
 */
    .notification-dot {
      position: absolute;
      top: 7px;
      right: 9px;
      width: 10px;
      height: 10px;
      background-color: var(--alert-background-color, #F68D3D);
      border-radius: 50%;
      /* PLA-1628: pulse "sonar" — núcleo respira + 2 anéis (::before/::after,
     defasados meio ciclo) expandem e somem. translateZ(0) mantém o GPU layer
